
# <ENVIRONMENT>/hiera.yaml
---
version: 5
defaults:
  datadir: data
  data_hash: yaml_data
hierarchy:
  - name: "Foreman group specific data"
    # fact "hostgroup" will define what yaml file to use
    # see foreman group parameters (usually is set there)
    path: "hostgroup/%{facts.hostgroup}.yaml"
  - name: "Host specific data"
    path: "host/%{trusted.certname}.yaml"
  - name: "Common data"
    path: "common.yaml"
