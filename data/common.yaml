## A bitmask to enable or disable specific detectors.
# NONE = 0
# DEMO = 1 << 0
# ROCKET = 1 << 1          # a detector of MISSILES with wistle (kalibr, jets, etc) that are close (<=500m)
# DRONE = 1 << 2           # a detector of ICE engines
# JET = 1 << 3             # a detector of JET engines without wistle (F16, etc) on longer distances.
# QUADROCOPTER = 1 << 4    # experimental and highly noisy detector of electic UAVs
# # if this is enabled, DRONE must also be enabled for it to work.
# JET_DRONE = 1 << 5       # a detector of drones with jet engines (shahed with a jet engine). Also detects high-altitude jet planes (at 10km).
sf::pyrocket_enc::pyrocket_detect_targets: 47  # all but QC

# GPS Spoofing Config - for now we just determine if GPS is spoofed and send it as a telemetry to zabbix.
sf::config::gps::spoofing:
  # consider time spoofed if GPS time drifts more than this amount of seconds from NTP time.
  time_drift_seconds: 3600
  # do not check GPS Location spoofing if number of sats is less than this amount
  min_satellites: 2
  # if GPS location is spoofed, the sensor will jump from one of its past locations, this defines
  # the maximum distance of that jump. If exceeds - GPS location is spoofed, report that to zabbix.
  max_distance: 1000000.0

#### Audio uploading backend config. GCP Firebase and S3 are supported (both self-hosted and AWS S3).
#### Only one of them can be configured at a time, or none.

# Firebase — disabled, using AWS S3 instead.
sf::pyrocket_enc::firebase::enabled: false

